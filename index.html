<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Purplebook</title>
  <style>
    :root{
      --bg1:#070b1a;
      --bg2:#111a48;
      --bg3:#3d1d72;
      --card:rgba(31,32,80,.72);
      --card2:rgba(16,18,49,.78);
      --stroke:rgba(144,118,255,.28);
      --text:#f4f2ff;
      --muted:#beb6ea;
      --chip:#2f2960;
      --btn:#6f48f5;
      --btn2:#2a2556;
      --good:#1ea672;
      --bad:#c44c6d;
      --warn:#c99b2e;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:#060915;color:var(--text);min-height:100%}
    body{overflow-x:hidden}

    .app-bg{
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(circle at 20% 10%, rgba(134,76,255,.30), transparent 28%),
        radial-gradient(circle at 80% 18%, rgba(57,111,255,.18), transparent 24%),
        linear-gradient(180deg, #1d1340 0%, #131942 30%, #0a102d 58%, #050915 100%);
    }
    .app-bg::after{
      content:"";
      position:absolute; inset:0;
      background:
        linear-gradient(transparent 0%, rgba(255,255,255,.02) 49%, transparent 50%, transparent 100%);
      background-size:100% 14px;
      opacity:.25;
      pointer-events:none;
    }

    #app{position:relative; z-index:1; padding:14px; max-width:1500px; margin:0 auto}
    .hidden{display:none !important}

    .glass{
      background:linear-gradient(180deg, rgba(73,52,145,.58), rgba(20,24,61,.78));
      backdrop-filter: blur(16px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
    }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      border-radius:28px; padding:14px 16px; margin-bottom:14px; position:sticky; top:8px; z-index:20;
    }
    .brand-wrap{display:flex; align-items:center; gap:14px; min-width:0}
    .menu-btn{
      width:54px;height:42px;border-radius:16px;border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.9); color:#111; font-size:22px; cursor:pointer;
    }
    .brand-mark{
      width:70px;height:70px;border-radius:22px; display:grid; place-items:center;
      background:linear-gradient(180deg,#8c5cff,#6739f0); font-weight:900; font-size:28px;
      box-shadow:0 14px 30px rgba(111,72,245,.45)
    }
    .brand-text h1{margin:0;font-size:28px;line-height:1.05}
    .brand-text p{margin:4px 0 0;color:var(--muted);font-size:17px}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .chip{
      border-radius:999px; padding:10px 16px; background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.08); color:var(--text)
    }
    .pill-btn,.btn{
      border:0; cursor:pointer; color:#fff; border-radius:999px; padding:12px 18px;
      font-size:16px; font-weight:700;
    }
    .pill-btn{background:rgba(110,87,210,.75); border:1px solid rgba(255,255,255,.08)}
    .btn.primary{background:linear-gradient(180deg,#7f5cff,#633df0)}
    .btn.secondary{background:var(--btn2); border:1px solid rgba(255,255,255,.09)}
    .btn.good{background:var(--good)}
    .btn.bad{background:var(--bad)}
    .btn.warn{background:var(--warn); color:#17120a}
    .btn.ghost{background:#3b355f}
    .btn.small{padding:9px 12px;font-size:14px}
    .btn:disabled{opacity:.45;cursor:not-allowed}

    .layout{
      display:grid;
      grid-template-columns:300px minmax(0,1fr);
      gap:14px;
    }

    .sidebar{
      border-radius:28px; padding:16px; height:calc(100vh - 120px); overflow:auto; position:sticky; top:102px;
    }
    .sidebar h2{margin:0 0 10px;font-size:16px;color:#ddd4ff;text-transform:uppercase;letter-spacing:.05em}
    .sidebar-section{margin-bottom:18px}
    .nav-btn{
      width:100%; text-align:left; margin-bottom:8px; background:rgba(255,255,255,.03); color:var(--text);
      border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:13px 14px; cursor:pointer; font-size:16px; font-weight:700
    }
    .nav-btn.active{background:linear-gradient(180deg,#7b57f2,#5f39ea)}
    .list-item{
      background:rgba(255,255,255,.035); border:1px solid rgba(255,255,255,.06);
      border-radius:18px; padding:14px; margin-bottom:10px;
    }
    .list-item h4{margin:0 0 6px;font-size:16px}
    .list-item p{margin:0;color:var(--muted)}
    .rules-list{padding-left:18px;margin:0;color:var(--muted)}
    .rules-list li{margin-bottom:8px}

    .main{min-width:0}
    .view{display:block}
    .hero{
      border-radius:32px; padding:28px;
    }
    .eyebrow{font-size:14px; text-transform:uppercase; letter-spacing:.08em; color:#ded4ff}
    .hero h2{margin:10px 0 0;font-size:56px;line-height:.95}
    .hero p{margin:16px 0 0; font-size:22px; color:#ebe5ff; max-width:960px}
    .card{
      border-radius:30px; padding:22px; margin-top:14px;
    }
    .section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .section-head h3,.section-head h4,.section-title{margin:0}
    .subtle,.muted{color:var(--muted)}
    .stats-grid{
      display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:14px; margin-top:14px;
    }
    .stat-box{
      background:rgba(14,17,45,.8); border:1px solid rgba(255,255,255,.05);
      border-radius:20px; padding:18px;
    }
    .stat-box .k{color:var(--muted);font-size:15px}
    .stat-box .v{font-size:20px;font-weight:900;margin-top:6px}
    .stack{display:block}
    .chip-row{display:flex;gap:10px;flex-wrap:wrap}
    .btn-grid{
      display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px;
    }
    .input,.select,.textarea{
      width:100%; background:#0d1230; color:#fff; border:1px solid rgba(255,255,255,.08);
      border-radius:16px; padding:14px 16px; font-size:16px;
    }
    .textarea{min-height:150px; resize:vertical}
    .label{display:block; margin:0 0 8px; color:#d7cff9; font-weight:700}
    .empty-state{
      text-align:center; color:var(--muted); padding:22px;
      background:rgba(255,255,255,.03); border:1px dashed rgba(255,255,255,.12); border-radius:18px;
    }
    .mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}

    .game-card .top{
      display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap
    }
    .status-open,.status-closed{
      padding:8px 12px;border-radius:999px;font-size:12px;font-weight:900;letter-spacing:.06em
    }
    .status-open{background:rgba(30,166,114,.18);color:#9bf2cd;border:1px solid rgba(30,166,114,.35)}
    .status-closed{background:rgba(196,76,109,.18);color:#ffb6c8;border:1px solid rgba(196,76,109,.35)}

    .fanduel-board{
      margin-top:14px; border:1px solid rgba(255,255,255,.08); border-radius:22px; overflow:hidden;
      background:rgba(5,9,27,.55)
    }
    .fd-header,.fd-row{
      display:grid;
      grid-template-columns:1.45fr 1fr 1fr 1fr;
      gap:12px;
      align-items:stretch;
    }
    .fd-header{
      background:rgba(255,255,255,.04); color:#cabfff; font-size:13px; font-weight:800;
      text-transform:uppercase; letter-spacing:.06em; padding:14px;
    }
    .fd-row{
      padding:14px; border-top:1px solid rgba(255,255,255,.06);
    }
    .fd-team{
      display:flex; align-items:center; gap:12px; font-weight:800; font-size:22px;
    }
    .team-dot{
      width:48px;height:48px;border-radius:50%;display:grid;place-items:center;font-size:15px;font-weight:900;
      background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.08)
    }
    .odd-cell button{
      width:100%; height:100%; min-height:72px;
      background:linear-gradient(180deg,#0a173f,#091333);
      border:2px solid #447cff; color:#eef3ff; border-radius:22px; cursor:pointer;
      font-size:20px; font-weight:900;
    }
    .odd-cell button small{display:block;font-size:16px;color:#b8caf7;font-weight:700}

    .bet-leg{
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06); border-radius:16px; padding:12px
    }
    .bet-leg-title{font-weight:800}
    .bet-leg-copy{color:var(--muted);margin-top:4px;font-size:14px}
    .pill{
      padding:7px 10px; border-radius:999px; text-transform:uppercase; font-size:12px; font-weight:900;
      background:rgba(255,255,255,.08)
    }
    .pill.open{color:#abf3d4}
    .pill.win{color:#abf3d4}
    .pill.loss{color:#ffc0cc}
    .pill.push,.pill.void{color:#ffefae}
    .kv{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px}

    .drawer,.modal{
      position:fixed; inset:0; z-index:60; background:rgba(2,4,12,.72); backdrop-filter:blur(8px);
      padding:14px;
    }
    .drawer .panel{
      position:absolute; right:14px; bottom:14px; width:min(380px,calc(100vw - 28px)); max-height:86vh; overflow:auto
    }
    .modal .panel{
      max-width:1180px; margin:0 auto; max-height:92vh; overflow:auto
    }

    .auth-users{
      display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-top:14px
    }
    .user-pick{
      border:none; border-radius:20px; padding:18px; cursor:pointer; color:#fff; font-size:20px; font-weight:900;
      background:linear-gradient(180deg,#7c59f3,#603aeb)
    }

    table{width:100%;border-collapse:collapse}
    th,td{padding:14px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}
    th{color:#d8d0ff;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
    td{color:#f6f4ff}
    .table-wrap{overflow:auto}

    .toast{
      position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:100;
      background:#151936; color:#fff; border:1px solid rgba(255,255,255,.1);
      padding:12px 16px; border-radius:999px; box-shadow:var(--shadow)
    }

    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .hero h2{font-size:42px}
      .hero p{font-size:18px}
      .stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 700px){
      #app{padding:10px}
      .topbar{padding:12px}
      .brand-mark{width:48px;height:48px;font-size:22px;border-radius:16px}
      .brand-text h1{font-size:22px}
      .brand-text p{font-size:14px}
      .hero{padding:22px}
      .hero h2{font-size:28px}
      .hero p{font-size:16px}
      .stats-grid{grid-template-columns:1fr 1fr}
      .fd-header,.fd-row{grid-template-columns:1fr}
      .fd-header{display:none}
      .fd-row{gap:10px}
      .fd-team{font-size:18px}
      .odd-cell button{min-height:62px;font-size:18px}
      .top-actions{justify-content:flex-start}
    }
  </style>
</head>

    function oddsText(odds){ return typeof odds === "string" ? odds : (odds > 0 ? "+" + odds : "" + odds); }
    function decimalOdds(odds){
      const n = Number(odds);
      if (Number.isNaN(n)) return 1;
      if (n > 0) return 1 + n / 100;
      return 1 + 100 / Math.abs(n);
    }
    function combinedOdds(legs){
      if (!legs.length) return "+0";
      const dec = legs.reduce((a,l)=>a*decimalOdds(l.odds),1);
      const us = dec >= 2 ? Math.round((dec - 1) * 100) : Math.round(-100 / (dec - 1));
      return us > 0 ? "+" + us : "" + us;
    }
    function payout(stake, odds){
      const n = Number(odds);
      if (!stake || Number.isNaN(n)) return 0;
      if (n > 0) return stake + stake * n / 100;
      return stake + stake * 100 / Math.abs(n);
    }

          <div class="section-head">
            <div><h4 style="margin:0">${bet.id}</h4><div class="subtle mt-8">${bet.type}</div></div>
            <div class="pill ${bet.status}">${bet.status}</div>
          </div>
          <div class="stats-grid mt-16">
            <div class="stat-box"><div class="k">Stake</div><div class="v">${money(bet.stake)}</div></div>
            <div class="stat-box"><div class="k">Odds</div><div class="v">${bet.odds}</div></div>
          </div>
          <div class="mt-16">${bet.legs.map(l => '<div class="bet-leg"><div class="bet-leg-title">'+l+'</div></div>').join("")}</div>
        `;
        wrap.appendChild(card);
      });
    }

    function renderBankroll(){
      const body = document.getElementById("bankrollBody");
      if (!body) return;
      body.innerHTML = "";
      APP.state.users.forEach(u => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${u.name}</td><td>${money(u.start)}</td><td>${money(u.wagered)}</td><td>${money(u.bankroll)}</td><td>${u.openBets}</td>`;
        body.appendChild(tr);
      });
    }

    function renderLeaderboard(){
      const wrap = document.getElementById("leaderboardList");
      if (!wrap) return;
      wrap.innerHTML = "";
      [...APP.state.users].sort((a,b)=>b.bankroll-a.bankroll).forEach((u,i) => {
        const row = document.createElement("div");
        row.className = "list-item";
        row.innerHTML = `<h4>#${i+1} ${u.name}</h4><p>${u.team} • ${money(u.bankroll)}</p>`;
        wrap.appendChild(row);
      });
    }

    function renderCreatealay(){
      const gamesWrap = document.getElementById("createalayGames");
      const marketsWrap = document.getElementById("createalayMarkets");
      const legsWrap = document.getElementById("createalayLegs");
      const output = document.getElementById("createalayOutput");
      if (!gamesWrap) return;

      gamesWrap.innerHTML = "";
      marketsWrap.innerHTML = "";
      legsWrap.innerHTML = "";
      output.innerHTML = "Select a game, market, and leg.";

      APP.state.games.forEach(g => {
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = `${g.away} @ ${g.home}${g.status === "closed" ? " (Closed)" : ""}`;
        btn.disabled = g.status === "closed";
        btn.onclick = () => {
          APP.ui.createalayGameId = g.id;
          APP.ui.createalayMarket = null;
          renderCreatealay();
        };
        gamesWrap.appendChild(btn);
      });

      if (!APP.ui.createalayGameId) return;

      const props = propsByGame(APP.ui.createalayGameId);
      const markets = [...new Set(props.map(p => p.market))];

      markets.forEach(m => {
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = m;
        btn.onclick = () => {
          APP.ui.createalayMarket = m;
          renderCreatealay();
        };
        marketsWrap.appendChild(btn);
      });

      if (!APP.ui.createalayMarket) return;

      props.filter(p => p.market === APP.ui.createalayMarket).forEach(leg => {
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = `${leg.player} • ${oddsText(leg.odds)}`;
        btn.onclick = () => {
          output.innerHTML = `
            <div class="bet-leg">
              <div class="bet-leg-title">${leg.label}</div>
              <div class="bet-leg-copy">Suggested Odds: ${oddsText(leg.odds)}</div>
            </div>
            <div class="mt-12"><button class="btn primary" id="addCreatealayLeg">Add To Slip</button></div>
          `;
          document.getElementById("addCreatealayLeg").onclick = () => {
            addLeg({ id: leg.id, label: leg.label, odds: leg.odds });
            toast("Createalay leg added");
          };
        };
        legsWrap.appendChild(btn);
      });
    }

    function toggleSlip(show){
      document.getElementById("slipDrawer").classList.toggle("hidden", !show);
      renderSlip();
    }

    function addLeg(leg){
      if (APP.state.betSlip.legs.some(l => l.id === leg.id)) return toast("Leg already added");
      APP.state.betSlip.legs.push(leg);
      renderSlip();
      toggleSlip(true);
    }

    function clearSlip(){
      APP.state.betSlip.legs = [];
      APP.state.betSlip.stake = 0;
      const stake = document.getElementById("stakeInput");
      if (stake) stake.value = "";
      renderSlip();
    }

    function renderSlip(){
      const wrap = document.getElementById("betSlipLegs");
      if (!wrap) return;

      APP.state.betSlip.betType = document.getElementById("betTypeSelect").value;
      APP.state.betSlip.stake = Number(document.getElementById("stakeInput").value || 0);

      if (!APP.state.betSlip.legs.length){
        wrap.className = "empty-state mt-16";
        wrap.textContent = "No legs added yet.";
      } else {
        wrap.className = "mt-16";
        wrap.innerHTML = APP.state.betSlip.legs.map(l => `
          <div class="bet-leg">
            <div class="bet-leg-title">${l.label}</div>
            <div class="bet-leg-copy">${oddsText(l.odds)}</div>
          </div>
        `).join("");
      }

      const odds = combinedOdds(APP.state.betSlip.legs);
      document.getElementById("slipOdds").textContent = odds;
      document.getElementById("slipPayout").textContent = money(payout(APP.state.betSlip.stake, Number(odds)));
    }

    function placeBet(){
      const user = currentUser();
      if (!user) return toast("Log in first");

      const legs = APP.state.betSlip.legs;
      const stake = APP.state.betSlip.stake;
      const type = APP.state.betSlip.betType;

      if (legs.length < APP.state.rules.minLegs) return toast("Need at least 2 legs");
      if (type === "season" && !APP.state.rules.seasonParlaysAllowed) return toast("Season parlays are closed");
      if (legs.length > (type === "season" ? APP.state.rules.maxSeasonLegs : APP.state.rules.maxWeeklyLegs)) return toast("Too many legs");
      if (!stake || stake > APP.state.rules.maxParlay) return toast("Invalid stake");
      if (stake > user.bankroll) return toast("Not enough bankroll");

      const odds = combinedOdds(legs);
      const pay = payout(stake, Number(odds));

      APP.state.bets.push({
        id: "BET-" + String(APP.state.bets.length + 1).padStart(3,"0"),
        user: user.name,
        type: type === "sgp" ? "Same Game Parlay" : type.charAt(0).toUpperCase() + type.slice(1) + " Parlay",
        stake,
        status: "open",
        odds,
        payout: pay,
        legs: legs.map(l => l.label)
      });

      user.bankroll -= stake;
      user.wagered += stake;
      user.openBets += 1;

      clearSlip();
      renderHome();
      renderMyBets();
      renderBankroll();
      renderLeaderboard();
      renderAdmin();
      toast("Bet placed");
    }

    function renderAdmin(){
      if (!isAdmin()) return;

      const select = document.getElementById("adminBetSelect");
      const gamesWrap = document.getElementById("adminGamesList");
      const logWrap = document.getElementById("commandLog");
      if (!select || !gamesWrap || !logWrap) return;

      select.innerHTML = "";
      APP.state.bets.forEach(b => {
        const opt = document.createElement("option");
        opt.value = b.id;
        opt.textContent = `${b.id} • ${b.user} • ${b.status}`;
        select.appendChild(opt);
      });

      gamesWrap.innerHTML = "";
      APP.state.games.forEach(g => {
        const box = document.createElement("div");
        box.className = "list-item";
        box.innerHTML = `<h4>${g.away} @ ${g.home}</h4><p>Status: ${g.status}</p>`;
        const row = document.createElement("div");
        row.className = "chip-row mt-12";

        const open = document.createElement("button");
        open.className = "btn good small";
        open.textContent = "Open";
        open.onclick = () => {
          g.status = "open";
          logCommand(`Opened ${g.away} @ ${g.home}`);
          renderGames(); renderCreatealay(); renderAdmin(); renderSidebarGames();
        };

        const close = document.createElement("button");
        close.className = "btn bad small";
        close.textContent = "Close";
        close.onclick = () => {
          g.status = "closed";
          logCommand(`Closed ${g.away} @ ${g.home}`);
          renderGames(); renderCreatealay(); renderAdmin(); renderSidebarGames();
        };

        row.appendChild(open); row.appendChild(close); box.appendChild(row); gamesWrap.appendChild(box);
      });

      logWrap.innerHTML = APP.state.commandLog.length
        ? APP.state.commandLog.map(item => `<div class="list-item"><h4>${item}</h4></div>`).join("")
        : `<div class="empty-state">No command log yet.</div>`;
    }

    function gradeBet(result){
      const select = document.getElementById("adminBetSelect");
      const bet = APP.state.bets.find(b => b.id === select.value);
      if (!bet) return;
      const user = APP.state.users.find(u => u.name === bet.user);
      bet.status = result;
      if (user){
        if (result === "win") user.bankroll += bet.payout;
        if (result === "push" || result === "void") user.bankroll += bet.stake;
        user.openBets = Math.max(0, user.openBets - 1);
      }
      logCommand(`Marked ${bet.id} as ${result.toUpperCase()}`);
      renderHome(); renderMyBets(); renderBankroll(); renderLeaderboard(); renderAdmin();
      toast(`${bet.id} marked ${result}`);
    }

    function applyCommand(){
      const raw = document.getElementById("commandInput").value.trim();
      if (!raw) return toast("Paste a command first");

      let cmd;
      try { cmd = JSON.parse(raw); }
      catch { return toast("Invalid JSON"); }

      if (cmd.type === "updateBankroll"){
        const user = APP.state.users.find(u => u.name === cmd.user);
        if (user && typeof cmd.amount === "number"){
          user.bankroll = cmd.amount;
          logCommand(`Updated bankroll for ${cmd.user} to ${cmd.amount}`);
        }
      }

      if (cmd.type === "openGame"){
        const game = gameById(cmd.gameId);
        if (game){
          game.status = "open";
          logCommand(`Opened ${game.away} @ ${game.home}`);
        }
      }

      if (cmd.type === "closeGame"){
        const game = gameById(cmd.gameId);
        if (game){
          game.status = "closed";
          logCommand(`Closed ${game.away} @ ${game.home}`);
        }
      }

      if (cmd.type === "addProp" && cmd.prop){
        APP.state.props.push(cmd.prop);
        logCommand(`Added prop ${cmd.prop.label}`);
      }

      if (cmd.type === "removeProp" && cmd.propId){
        APP.state.props = APP.state.props.filter(p => p.id !== cmd.propId);
        logCommand(`Removed prop ${cmd.propId}`);
      }

      document.getElementById("commandInput").value = "";
      renderHome(); renderGames(); renderCreatealay(); renderAdmin();
      toast("Command applied");
    }

    function logCommand(text){
      APP.state.commandLog.unshift(text);
    }

    render();
  </script>
</body>
</html>
