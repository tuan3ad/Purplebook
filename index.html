<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinalDraft Sportsbook</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="authRoot"></div>
  <div id="appRoot" class="hidden">
    <header class="topbar">
      <div class="brandWrap">
        <div class="logo">FD</div>
        <div>
          <h1 id="appTitle">FinalDraft</h1>
          <p>Private Madden League Sportsbook</p>
        </div>
      </div>
      <div class="topActions">
        <button id="weekBtn" class="pill active">Week 3</button>
        <button id="adminTabBtn" class="pill">Admin</button>
        <button id="logoutBtn" class="pill">Logout</button>
      </div>
    </header>
    <main class="appMain">
      <section id="homePage" class="page"></section>
      <section id="sportsbookPage" class="page hidden"></section>
      <section id="betslipPage" class="page hidden"></section>
      <section id="mybetsPage" class="page hidden"></section>
      <section id="boardPage" class="page hidden"></section>
      <section id="adminPage" class="page hidden"></section>
    </main>
    <nav class="bottomNav">
      <button data-page="homePage" class="navBtn active">Home</button>
      <button data-page="sportsbookPage" class="navBtn">Sportsbook</button>
      <button data-page="betslipPage" class="navBtn">Bet Slip</button>
      <button data-page="mybetsPage" class="navBtn">My Bets</button>
      <button data-page="boardPage" class="navBtn">Board</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
