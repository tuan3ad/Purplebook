<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Purplebook</title>
  <style>
    :root{
      --bg1:#070b1a;
      --bg2:#131b44;
      --bg3:#3b1e73;
      --glass:rgba(24,26,58,.72);
      --glass2:rgba(14,18,40,.82);
      --stroke:rgba(144,118,255,.22);
      --text:#f5f3ff;
      --muted:#bdb6eb;
      --accent:#7a56f5;
      --accent2:#4b7dff;
      --green:#1fb878;
      --red:#d75b78;
      --yellow:#d8a136;
      --shadow:0 18px 40px rgba(0,0,0,.35);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;background:#050814;color:var(--text)}
    body{overflow-x:hidden}
    .bg{
      position:fixed; inset:0; z-index:0;
      background:
        radial-gradient(circle at 15% 10%, rgba(122,86,245,.28), transparent 28%),
        radial-gradient(circle at 85% 15%, rgba(75,125,255,.18), transparent 26%),
        linear-gradient(180deg, #201145 0%, #141a43 35%, #0b1230 70%, #050814 100%);
      pointer-events:none;
    }
    .bg:after{
      content:"";
      position:absolute; inset:0;
      background:linear-gradient(transparent 0, rgba(255,255,255,.02) 49%, transparent 50%);
      background-size:100% 14px;
      opacity:.18;
    }
    #app{position:relative; z-index:1; padding:12px; max-width:1500px; margin:0 auto}
    .hidden{display:none !important}
    .glass{
      background:linear-gradient(180deg,var(--glass),var(--glass2));
      backdrop-filter:blur(16px);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }
    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:14px;
      padding:14px 16px; margin-bottom:14px; position:sticky; top:8px; z-index:20;
    }
    .brand{display:flex; align-items:center; gap:14px; min-width:0}
    .brand-mark{
      width:60px; height:60px; border-radius:18px; display:grid; place-items:center;
      background:linear-gradient(180deg,var(--accent),#5f3cea); font-weight:900; font-size:24px;
      box-shadow:0 12px 28px rgba(122,86,245,.4);
    }
    .brand h1{margin:0;font-size:26px;line-height:1}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .top-actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end}
    .chip, .pill-btn, .btn{
      border:none; border-radius:999px; color:#fff; font-weight:800; cursor:pointer;
    }
    .chip{padding:10px 14px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.08)}
    .pill-btn{padding:10px 14px; background:rgba(122,86,245,.75)}
    .btn{padding:12px 16px; font-size:15px}
    .btn.primary{background:linear-gradient(180deg,var(--accent),#603bea)}
    .btn.secondary{background:#2a2755; border:1px solid rgba(255,255,255,.08)}
    .btn.good{background:var(--green)}
    .btn.bad{background:var(--red)}
    .btn.warn{background:var(--yellow); color:#1d1403}
    .btn.ghost{background:#4a466e}
    .btn.small{padding:8px 12px; font-size:13px}
    .layout{display:grid; grid-template-columns:290px minmax(0,1fr); gap:14px}
    .sidebar{padding:16px; height:calc(100vh - 108px); overflow:auto; position:sticky; top:100px}
    .sidebar h3{margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:#e1d8ff}
    .sidebar-section{margin-bottom:18px}
    .nav-btn{
      width:100%; text-align:left; padding:12px 14px; margin-bottom:8px; border:none; cursor:pointer;
      background:rgba(255,255,255,.04); color:#fff; border-radius:16px; font-weight:800;
      border:1px solid rgba(255,255,255,.06)
    }
    .nav-btn.active{background:linear-gradient(180deg,var(--accent),#603bea)}
    .rules{padding-left:18px; margin:0; color:var(--muted)}
    .rules li{margin-bottom:8px}
    .main{min-width:0}
    .view{display:block}
    .hero{padding:24px}
    .eyebrow{font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:#e5ddff}
    .hero h2{margin:8px 0 0; font-size:44px; line-height:.95}
    .hero p{margin:12px 0 0; font-size:18px; color:#ece7ff; max-width:900px}
    .card{padding:20px; margin-top:14px}
    .section-head{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap}
    .section-head h3,.section-head h4{margin:0}
    .subtle{color:var(--muted)}
    .stats-grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-top:14px}
    .stat-box{padding:18px; border-radius:20px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06)}
    .stat-box .k{font-size:14px; color:var(--muted)}
    .stat-box .v{font-size:20px; font-weight:900; margin-top:6px}
    .stack > * + *{margin-top:12px}
    .chip-row{display:flex; gap:10px; flex-wrap:wrap}
    .btn-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px}
    .input,.select,.textarea{
      width:100%; padding:14px 16px; border-radius:16px; border:1px solid rgba(255,255,255,.08);
      background:#0d1230; color:#fff; font-size:16px
    }
    .textarea{min-height:140px; resize:vertical}
    .label{display:block; margin:0 0 8px; color:#ddd5ff; font-weight:800}
    .empty{padding:18px; border-radius:18px; color:var(--muted); background:rgba(255,255,255,.03); border:1px dashed rgba(255,255,255,.1)}
    .list-item{padding:14px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06)}
    .list-item h4{margin:0 0 6px}
    .list-item p{margin:0; color:var(--muted)}
    .fanduel{margin-top:14px; border-radius:22px; overflow:hidden; border:1px solid rgba(255,255,255,.08); background:rgba(5,9,27,.55)}
    .fd-head,.fd-row{
      display:grid; grid-template-columns:1.5fr 1fr 1fr 1fr; gap:12px; align-items:stretch;
    }
    .fd-head{padding:14px; background:rgba(255,255,255,.04); color:#d8d0ff; font-size:13px; font-weight:900; text-transform:uppercase; letter-spacing:.06em}
    .fd-row{padding:14px; border-top:1px solid rgba(255,255,255,.06)}
    .team{display:flex; align-items:center; gap:12px; font-size:20px; font-weight:900}
    .team-dot{
      width:44px; height:44px; border-radius:50%; display:grid; place-items:center; font-size:13px; font-weight:900;
      background:linear-gradient(180deg,rgba(255,255,255,.14),rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.08)
    }
    .odd button{
      width:100%; min-height:70px; border-radius:20px; border:2px solid #447cff; background:linear-gradient(180deg,#0a173f,#091333);
      color:#eef3ff; font-size:18px; font-weight:900; cursor:pointer;
    }
    .odd button small{display:block; color:#b8caf7; font-size:15px; font-weight:700}
    .status{
      padding:8px 12px; border-radius:999px; font-size:12px; font-weight:900; letter-spacing:.06em
    }
    .status.open{background:rgba(31,184,120,.18); color:#adf4d2; border:1px solid rgba(31,184,120,.3)}
    .status.closed{background:rgba(215,91,120,.18); color:#ffc0cf; border:1px solid rgba(215,91,120,.3)}
    .bet-leg{padding:12px; border-radius:16px; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.06)}
    .bet-leg-title{font-weight:900}
    .bet-leg-copy{margin-top:4px; color:var(--muted); font-size:14px}
    .pill{padding:7px 10px; border-radius:999px; font-size:12px; font-weight:900; text-transform:uppercase; background:rgba(255,255,255,.08)}
    .pill.open,.pill.win{color:#abf3d4}
    .pill.loss{color:#ffc0cf}
    .pill.push,.pill.void{color:#ffe7a1}
    .kv{display:flex; justify-content:space-between; gap:12px; margin-bottom:8px}
    .overlay{
      position:fixed; inset:0; background:rgba(2,4,12,.72); backdrop-filter:blur(8px); z-index:60; padding:14px;
    }
    .overlay .panel{max-width:1180px; margin:0 auto; max-height:92vh; overflow:auto}
    .drawer .panel{position:absolute; right:14px; bottom:14px; width:min(390px, calc(100vw - 28px))}
    .toast{
      position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:100;
      padding:12px 16px; border-radius:999px; background:#151936; border:1px solid rgba(255,255,255,.1)
    }
    @media (max-width: 980px){
      .layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .hero h2{font-size:34px}
      .stats-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width: 720px){
      #app{padding:10px}
      .topbar{padding:12px}
      .brand-mark{width:48px;height:48px;font-size:20px}
      .brand h1{font-size:22px}
      .hero h2{font-size:28px}
      .hero p{font-size:16px}
      .stats-grid{grid-template-columns:1fr 1fr}
      .fd-head{display:none}
      .fd-row{grid-template-columns:1fr; gap:10px}
      .team{font-size:18px}
      .odd button{min-height:62px}
    }
  </style>
</head>

    function currentUser(){ return APP.state.users.find(u=>u.id===APP.state.currentUser)||null; }
    function isAdmin(){ return !!currentUser()?.admin; }
    function gameById(id){ return APP.state.games.find(g=>g.id===id); }
    function propsByGame(id){ return APP.state.props.filter(p=>p.gameId===id); }
    function money(n){ return "$"+Number(n).toFixed(0); }
    function oddsText(o){ return typeof o==="string" ? o : (o>0?`+${o}`:`${o}`); }
    function decOdds(o){ const n=Number(o); if(Number.isNaN(n)) return 1; return n>0 ? 1+n/100 : 1+100/Math.abs(n); }
    function combinedOdds(legs){
      if(!legs.length) return "+0";
      const dec = legs.reduce((a,l)=>a*decOdds(l.odds),1);
      const us = dec >= 2 ? Math.round((dec-1)*100) : Math.round(-100/(dec-1));
      return us>0?`+${us}`:`${us}`;
    }
    function payout(stake, odds){
      const n = Number(odds);
      if(!stake || Number.isNaN(n)) return 0;
      return n>0 ? stake + stake*n/100 : stake + stake*100/Math.abs(n);
    }
    function toast(msg){

      t.classList.remove("hidden");
      clearTimeout(window.__toast);
      window.__toast=setTimeout(()=>t.classList.add("hidden"), 2200);

      document.querySelectorAll(".nav-btn").forEach(btn=>{

          const view = btn.dataset.view;
          if(view === "admin" && !isAdmin()) return;
          setView(view);
        });
      });

      document.getElementById("filterOpen").addEventListener("click", ()=>{ APP.ui.filter="open"; renderGames(); });

      document.getElementById("gradeLoss").addEventListener("click", ()=>gradeBet("loss"));

    function renderAuth(){
      setView("auth");
      const stage = document.getElementById("authStage");
      stage.innerHTML = `

      `;
      const wrap = document.getElementById("authUsers");
      APP.state.users.forEach(user=>{
        const btn = document.createElement("button");
        btn.className = "btn primary";
        btn.textContent = user.name;
        btn.addEventListener("click", ()=>{
          const p = pins();
          if(p[user.id]) renderPinEntry(user);
          else renderPinCreate(user);
        });
        wrap.appendChild(btn);
      });
    }

    function renderPinCreate(user){
      const stage = document.getElementById("authStage");
      stage.innerHTML = `
        <h3 style="margin:0">Create PIN</h3>
        <p class="subtle" style="margin-top:8px">${user.name}, create and confirm your 4-digit PIN.</p>
        <div style="margin-top:16px"><input id="pin1" class="input" maxlength="4" placeholder="Create PIN" /></div>
        <div style="margin-top:12px"><input id="pin2" class="input" maxlength="4" placeholder="Confirm PIN" /></div>
        <div class="btn-grid" style="margin-top:16px">
          <button class="btn secondary" id="authBack">Back</button>
          <button class="btn primary" id="authSavePin">Confirm</button>
        </div>
      `;
      document.getElementById("authBack").addEventListener("click", renderAuth);
      document.getElementById("authSavePin").addEventListener("click", ()=>{
        const p1 = document.getElementById("pin1").value.trim();
        const p2 = document.getElementById("pin2").value.trim();
        if(!/^\d{4}$/.test(p1)) return toast("PIN must be 4 digits");
        if(p1 !== p2) return toast("PINs do not match");
        const p = pins();
        p[user.id] = p1;
        savePins(p);
        login(user.id);
      });
    }

    function renderPinEntry(user){
      const stage = document.getElementById("authStage");
      stage.innerHTML = `
        <h3 style="margin:0">Enter PIN</h3>
        <p class="subtle" style="margin-top:8px">${user.name}, enter your 4-digit PIN.</p>

          <button class="btn primary" id="authEnterPin">Enter</button>

      document.getElementById("authBack").addEventListener("click", renderAuth);
      document.getElementById("authEnterPin").addEventListener("click", ()=>{
        if(pins()[user.id] !== document.getElementById("pinEntry").value.trim()) return toast("Wrong PIN");
        login(user.id);
      });

    function renderCreatealay(){
      const gamesWrap = document.getElementById("createalayGames");
      const marketsWrap = document.getElementById("createalayMarkets");
      const legsWrap = document.getElementById("createalayLegs");
      const out = document.getElementById("createalayOutput");
      if(!gamesWrap) return;

      gamesWrap.innerHTML = "";
      marketsWrap.innerHTML = "";
      legsWrap.innerHTML = "";
      out.innerHTML = "Select a game, market, and leg.";

      APP.state.games.forEach(g=>{
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = `${g.away} @ ${g.home}${g.status==="closed" ? " (Closed)" : ""}`;
        btn.disabled = g.status==="closed";
        btn.addEventListener("click", ()=>{
          APP.ui.createalayGameId = g.id;
          APP.ui.createalayMarket = null;
          renderCreatealay();
        });
        gamesWrap.appendChild(btn);
      });

      if(!APP.ui.createalayGameId) return;

      const props = propsByGame(APP.ui.createalayGameId);
      const markets = [...new Set(props.map(p=>p.market))];
      markets.forEach(m=>{
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = m;
        btn.addEventListener("click", ()=>{
          APP.ui.createalayMarket = m;
          renderCreatealay();
        });
        marketsWrap.appendChild(btn);
      });

      if(!APP.ui.createalayMarket) return;

      props.filter(p=>p.market===APP.ui.createalayMarket).forEach(p=>{
        const btn = document.createElement("button");
        btn.className = "btn secondary";
        btn.textContent = `${p.player} • ${oddsText(p.odds)}`;
        btn.addEventListener("click", ()=>{
          out.innerHTML = `
            <div class="bet-leg">
              <div class="bet-leg-title">${p.label}</div>
              <div class="bet-leg-copy">Suggested Odds: ${oddsText(p.odds)}</div>
            </div>
            <div style="margin-top:12px"><button class="btn primary" id="addCreatealay">Add To Slip</button></div>
          `;
          document.getElementById("addCreatealay").addEventListener("click", ()=>{
            addLeg({ id:p.id, label:p.label, odds:p.odds });
            toast("Createalay leg added");
          });
        });
        legsWrap.appendChild(btn);
      });
    }

    function toggleSlip(show){
      document.getElementById("slipDrawer").classList.toggle("hidden", !show);
      renderSlip();

    function addLeg(leg){
      if(APP.state.betSlip.legs.some(l=>l.id===leg.id)) return toast("Leg already added");
      APP.state.betSlip.legs.push(leg);
      renderSlip();
      toggleSlip(true);
    }

    function clearSlip(){
      APP.state.betSlip.legs = [];
      APP.state.betSlip.stake = 0;
      const stake = document.getElementById("stakeInput");
      if(stake) stake.value = "";
      renderSlip();
    }

    function renderSlip(){
      const wrap = document.getElementById("slipLegs");
      if(!wrap) return;

      APP.state.betSlip.betType = document.getElementById("betTypeSelect").value;
      APP.state.betSlip.stake = Number(document.getElementById("stakeInput").value || 0);

      if(!APP.state.betSlip.legs.length){
        wrap.className = "empty";
        wrap.textContent = "No legs added yet.";
      } else {
        wrap.className = "";
        wrap.innerHTML = APP.state.betSlip.legs.map(l=>`
          <div class="bet-leg">
            <div class="bet-leg-title">${l.label}</div>
            <div class="bet-leg-copy">${oddsText(l.odds)}</div>
          </div>
        `).join("");
      }

      const odds = combinedOdds(APP.state.betSlip.legs);
      document.getElementById("slipOdds").textContent = odds;
      document.getElementById("slipPayout").textContent = money(payout(APP.state.betSlip.stake, Number(odds)));
    }

    function placeBet(){
      const user = currentUser();
      if(!user) return toast("Log in first");
      const legs = APP.state.betSlip.legs;
      const stake = APP.state.betSlip.stake;
      const type = APP.state.betSlip.betType;

      if(legs.length < APP.state.rules.minLegs) return toast("Need at least 2 legs");
      if(type==="season" && !APP.state.rules.seasonParlaysAllowed) return toast("Season parlays are closed");
      if(legs.length > (type==="season" ? APP.state.rules.maxSeasonLegs : APP.state.rules.maxWeeklyLegs)) return toast("Too many legs");
      if(!stake || stake > APP.state.rules.maxParlay) return toast("Invalid stake");
      if(stake > user.bankroll) return toast("Not enough bankroll");

      const odds = combinedOdds(legs);
      const pay = payout(stake, Number(odds));

      APP.state.bets.push({
        id:"BET-"+String(APP.state.bets.length+1).padStart(3,"0"),
        user:user.name,
        type:type==="sgp" ? "Same Game Parlay" : type.charAt(0).toUpperCase()+type.slice(1)+" Parlay",
        stake,
        status:"open",
        odds,
        payout:pay,
        legs:legs.map(l=>l.label)
      });

      user.bankroll -= stake;
      user.wagered += stake;
      user.openBets += 1;

      clearSlip();
      renderHome(); renderMyBets(); renderBankroll(); renderLeaderboard(); renderAdmin();
      toast("Bet placed");
    }

    function renderAdmin(){
      if(!isAdmin()) return;
      const select = document.getElementById("adminBetSelect");
      const games = document.getElementById("adminGamesList");
      const log = document.getElementById("commandLog");
      if(!select || !games || !log) return;

      select.innerHTML = "";
      APP.state.bets.forEach(b=>{
        const opt = document.createElement("option");
        opt.value = b.id;
        opt.textContent = `${b.id} • ${b.user} • ${b.status}`;
        select.appendChild(opt);
      });

      games.innerHTML = "";
      APP.state.games.forEach(g=>{
        const item = document.createElement("div");
        item.className = "list-item";
        item.innerHTML = `<h4>${g.away} @ ${g.home}</h4><p>Status: ${g.status}</p>`;
        const row = document.createElement("div");
        row.className = "chip-row";
        row.style.marginTop = "12px";

        const open = document.createElement("button");
        open.className = "btn good small";
        open.textContent = "Open";
        open.addEventListener("click", ()=>{
          g.status = "open";
          logCommand(`Opened ${g.away} @ ${g.home}`);
          renderGames(); renderCreatealay(); renderAdmin(); renderSidebarGames();
        });

        const close = document.createElement("button");
        close.className = "btn bad small";
        close.textContent = "Close";
        close.addEventListener("click", ()=>{
          g.status = "closed";
          logCommand(`Closed ${g.away} @ ${g.home}`);
          renderGames(); renderCreatealay(); renderAdmin(); renderSidebarGames();
        });

        row.appendChild(open); row.appendChild(close); item.appendChild(row); games.appendChild(item);
      });

      log.innerHTML = APP.state.commandLog.length
        ? APP.state.commandLog.map(x=>`<div class="list-item"><h4>${x}</h4></div>`).join("")
        : `<div class="empty">No command log yet.</div>`;
    }

    function gradeBet(result){
      const select = document.getElementById("adminBetSelect");
      const bet = APP.state.bets.find(b=>b.id===select.value);
      if(!bet) return;
      const user = APP.state.users.find(u=>u.name===bet.user);
      bet.status = result;
      if(user){
        if(result==="win") user.bankroll += bet.payout;
        if(result==="push" || result==="void") user.bankroll += bet.stake;
        user.openBets = Math.max(0, user.openBets - 1);
      }
      logCommand(`Marked ${bet.id} as ${result.toUpperCase()}`);
      renderHome(); renderMyBets(); renderBankroll(); renderLeaderboard(); renderAdmin();
      toast(`${bet.id} marked ${result}`);
    }

    function applyCommand(){
      const raw = document.getElementById("commandInput").value.trim();
      if(!raw) return toast("Paste a command first");
      let cmd;
      try { cmd = JSON.parse(raw); }
      catch { return toast("Invalid JSON"); }

      if(cmd.type==="updateBankroll"){
        const user = APP.state.users.find(u=>u.name===cmd.user);
        if(user && typeof cmd.amount==="number"){
          user.bankroll = cmd.amount;
          logCommand(`Updated bankroll for ${cmd.user} to ${cmd.amount}`);
        }
      }
      if(cmd.type==="openGame"){
        const g = gameById(cmd.gameId);
        if(g){ g.status="open"; logCommand(`Opened ${g.away} @ ${g.home}`); }
      }
      if(cmd.type==="closeGame"){
        const g = gameById(cmd.gameId);
        if(g){ g.status="closed"; logCommand(`Closed ${g.away} @ ${g.home}`); }
      }
      if(cmd.type==="addProp" && cmd.prop){
        APP.state.props.push(cmd.prop);
        logCommand(`Added prop ${cmd.prop.label}`);
      }
      if(cmd.type==="removeProp" && cmd.propId){
        APP.state.props = APP.state.props.filter(p=>p.id!==cmd.propId);
        logCommand(`Removed prop ${cmd.propId}`);
      }

      document.getElementById("commandInput").value = "";
      renderHome(); renderGames(); renderCreatealay(); renderAdmin(); renderSidebarGames();
      toast("Command applied");
    }

    function logCommand(text){ APP.state.commandLog.unshift(text); }

    render();
  </script>
</body>
</html>
